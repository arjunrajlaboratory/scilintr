name: R tests

on:
  push:
    paths:
      - 'r/**'
      - '.github/workflows/r-check.yaml'
  pull_request:
    paths:
      - 'r/**'
      - '.github/workflows/r-check.yaml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        run: |
          Rscript -e 'install.packages(c("lintr", "xml2", "xmlparsedata", "yaml", "cli", "jsonlite", "testthat"))'

      - name: Run fixture tests
        working-directory: r/scilintr
        run: Rscript tests/run-tests.R
